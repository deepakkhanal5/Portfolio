<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile {
            display: flex;
            align-items: center;
            margin-left: auto;
        }
        .profile img {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            margin-right: 8px;
        }
        @media (max-width: 768px) {
            .profile img {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="menu">
            <div class="hamburger-menu">Menu</div>
        </div>
        <div class="profile">
            <img src="path_to_profile_image.jpg" alt="Dipak's Profile">
            <span>Dipak</span>
        </div>
    </nav>
    <script src="script.js"></script>
</body>
</html>
